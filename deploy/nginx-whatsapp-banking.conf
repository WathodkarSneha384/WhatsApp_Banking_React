# UAT / Production — WhatsApp Banking React
# Public URL: https://223.30.224.244:6443/
# Internal server: 10.2.0.30
# API proxy: 10.2.0.121:8182

server {
    listen 6443 ssl http2;
    listen [::]:6443 ssl http2;
    server_name 223.30.224.244 10.2.0.30;

    ssl_certificate     /etc/ssl/certs/whatsapp-banking.crt;
    ssl_certificate_key /etc/ssl/private/whatsapp-banking.key;

    root /usr/local/WhatsApp_Banking_React/dist;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /dmCmsService/ {
        proxy_pass http://10.2.0.121:8182/dmCmsService/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /whatsapp/ {
        proxy_pass http://10.2.0.121:8182/whatsapp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }
}

# Optional HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 223.30.224.244 10.2.0.30;
    return 301 https://$host:6443$request_uri;
}
